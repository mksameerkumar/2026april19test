name: Build LaTeX
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex # Ensure this matches your filename!

      - name: Save PDF
        uses: actions/upload-artifact@v4
        with:
          name: Final_Document
          path: main.pdf
